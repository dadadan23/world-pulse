version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "dan.goldman" # Update with actual GitHub username
    labels:
      - "dependencies"
      - "automated"
    # Group updates by type. Major bumps are excluded from grouping so an
    # incompatible major-version update (e.g. a peer-dependency conflict)
    # surfaces as its own PR instead of blocking a batch of safe patch/minor
    # updates.
    groups:
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
    # Version strategy
    versioning-strategy: increase

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
